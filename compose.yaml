version: '3.9'

services:
  tenant:
    build:
      context: ./apps/tenant
    ports:
      - "3000:3000"
    env_file:
      - ./apps/tenant/.env.local

  management:
    build:
      context: ./apps/management
    ports:
      - "3001:3000"
    env_file:
      - ./apps/management/.env.local

  ai:
    build:
      context: ./apps/ai
    ports:
      - "8000:8000"
networks:
  default:
    name: sbhms_network